name: assessment-prod
services:
  postgres:
    image: postgres:16-alpine
    container_name: assessment-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - assessment-production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: assessment-app-prod
    restart: always
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-3000}${API_PREFIX:-/api}/${NODE_ENV:-production}/${API_VERSION:-v1}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - assessment-production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  assessment-production:
    name: assessment-production

volumes:
  postgres_data_prod:
